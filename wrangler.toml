name = "luderbein-website"
compatibility_date = "2026-03-10"
pages_build_output_dir = "."

[vars]
ALLOWED_ORIGIN = "https://luderbein-gravur.pages.dev"
PINBOARD_PUBLIC_REQUIRES_APPROVAL = "true"
PINBOARD_NOTIFY_TO = "luderbein_gravur@icloud.com"
PINBOARD_EMAIL_FROM = "Pinnwand <onboarding@resend.dev>"
PINBOARD_ADMIN_TOKEN = "HIER_EIN_LANGES_ADMIN_TOKEN_SETZEN"

[[d1_databases]]
binding = "PINBOARD_DB"
database_name = "luderbein-pinnwand"
database_id = "HIER_DIE_D1_DATABASE_ID_EINTRAGEN"
