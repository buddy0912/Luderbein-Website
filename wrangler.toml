name = "luderbein-website"
compatibility_date = "2026-03-10"

[vars]
ALLOWED_ORIGIN = "https://luderbein-gravur.pages.dev"
PINBOARD_PUBLIC_REQUIRES_APPROVAL = "true"
PINBOARD_NOTIFY_TO = "luderbein_gravur@icloud.com"
PINBOARD_EMAIL_FROM = "Pinnwand <onboarding@resend.dev>"

[[d1_databases]]
binding = "PINBOARD_DB"
database_name = "pinnwand_datenbank"
database_id = "43584731-7e0c-4e18-8dd8-ed0ac02076f9"

# Set admin tokens as Cloudflare secrets, not as plain vars:
# wrangler secret put PINBOARD_ADMIN_TOKEN
# Optional separate token for Rechteerklaerung intern:
# wrangler secret put RIGHTS_ADMIN_TOKEN

# Optional private R2 archive for Rechteerklaerung PDFs:
# [[r2_buckets]]
# binding = "RIGHTS_ARCHIVE_BUCKET"
# bucket_name = "luderbein-rights-archive"
